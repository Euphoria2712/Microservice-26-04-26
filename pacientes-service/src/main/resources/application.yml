server:
  port: 8081

spring:
  application:
    name: pacientes-service

  datasource:
    url: jdbc:mysql://localhost:3306/db_pacientes?useSSL=false&serverTimezone=UTC
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  flyway:
    enabled: true
    baseline-on-migrate: true